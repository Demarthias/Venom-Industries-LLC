  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0e13; color: #e7edf2; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

    nav { padding: 1rem 2rem; border-bottom: 1px solid rgba(0,224,255,0.12); }
    nav a { color: #94a3b8; text-decoration: none; font-size: 13px; margin-right: 1.5rem; transition: color 0.2s; }
    nav a:hover { color: #00ffc8; }

    .page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 3rem 1rem; }

    .sub-wrapper {
      width: 100%;
      max-width: 480px;
      background: rgba(20,28,38,0.96);
      border-radius: 18px;
      box-shadow: 0 0 40px rgba(0,255,200,0.08);
      padding: 2.5rem 2rem;
      border: 1.5px solid rgba(0,224,255,0.3);
    }

    .sub-logo { text-align: center; margin-bottom: 0.5rem; }
    .sub-logo span { font-size: 28px; }

    h1 {
      font-family: 'Orbitron', sans-serif;
      color: #00ffc8;
      text-align: center;
      font-size: 1.4rem;
      margin-bottom: 0.4rem;
      letter-spacing: 0.04em;
    }

    .sub-tagline { text-align: center; color: #64748b; font-size: 13px; margin-bottom: 2rem; }

    .plans { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.5rem; }

    .plan-option {
      border: 1.5px solid rgba(0,224,255,0.18);
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .plan-option:hover { border-color: rgba(0,255,200,0.5); background: rgba(0,255,200,0.04); }
    .plan-option.selected { border-color: #00ffc8; background: rgba(0,255,200,0.07); }

    .plan-option input[type="radio"] { display: none; }

    .plan-label { font-weight: 600; font-size: 14px; color: #e7edf2; }
    .plan-price { font-size: 13px; color: #00e0ff; font-weight: 600; }
    .plan-per { font-size: 11px; color: #64748b; margin-top: 2px; }

    .plan-badge {
      position: absolute;
      top: -9px;
      right: 12px;
      background: #00ffc8;
      color: #0a0e13;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .cta-btn {
      width: 100%;
      padding: 0.85rem;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #00ffc8, #00b4ff);
      color: #0a0e13;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }

    .cta-btn:hover { opacity: 0.92; transform: translateY(-1px); }
    .cta-btn:active { transform: translateY(0); }

    .sub-note { text-align: center; font-size: 11px; color: #475569; margin-top: 1rem; line-height: 1.6; }
    .sub-note a { color: #00e0ff; text-decoration: none; }
  </style>
</head>

  <div class="page">
    <div class="sub-wrapper">
      <div class="sub-logo"><span>🔍</span></div>
      <h1>Choose Your Plan</h1>
      <p class="sub-tagline">SaaS Detective Pro — unlock all 200+ tech signatures</p>

      <div class="plans" id="planList">
        <label class="plan-option" data-url="https://buy.stripe.com/aFaaEZ76edBi8aQ5wD1Jm00">
          <input type="radio" name="plan" value="monthly">
          <div>
            <div class="plan-label">Monthly</div>
            <div class="plan-per">Billed monthly</div>
          </div>
          <div style="text-align:right">
            <div class="plan-price">$7.99</div>
            <div class="plan-per">per month</div>
          </div>
        </label>

        <label class="plan-option" data-url="https://buy.stripe.com/3cIdRb76e9l28aQcZ51Jm04">
          <input type="radio" name="plan" value="quarterly">
          <div>
            <div class="plan-label">3 Months</div>
            <div class="plan-per">Billed every 3 months</div>
          </div>
          <div style="text-align:right">
            <div class="plan-price">$19.99</div>
            <div class="plan-per">~$6.66/mo</div>
          </div>
        </label>

        <label class="plan-option" data-url="https://buy.stripe.com/6oU00lduC54M0Io5wD1Jm05">
          <input type="radio" name="plan" value="biannual">
          <div>
            <div class="plan-label">6 Months</div>
            <div class="plan-per">Billed every 6 months</div>
          </div>
          <div style="text-align:right">
            <div class="plan-price">$34.99</div>
            <div class="plan-per">~$5.83/mo</div>
          </div>
        </label>

        <label class="plan-option selected" data-url="https://buy.stripe.com/8x2bJ3bmu8gYgHm1gn1Jm06">
          <div class="plan-badge">7-day free trial</div>
          <input type="radio" name="plan" value="annual" checked>
          <div>
            <div class="plan-label">Annual</div>
            <div class="plan-per">Billed once per year</div>
          </div>
          <div style="text-align:right">
            <div class="plan-price">$59.99</div>
            <div class="plan-per">7-day free trial · then ~$5/mo</div>
          </div>
        </label>
      </div>

      <button class="cta-btn" id="checkoutBtn">Continue to Checkout →</button>

      <p class="sub-note">
        Secure checkout via Stripe. Cancel anytime.<br>
        Questions? <a href="mailto:grayson@venom-industries.com">grayson@venom-industries.com</a>
      </p>
    </div>
  </div>

  <script>
    let selectedUrl = 'https://buy.stripe.com/8x2bJ3bmu8gYgHm1gn1Jm06';
    let selectedPlan = 'annual';

    document.querySelectorAll('.plan-option').forEach(function(option) {
      option.addEventListener('click', function() {
        document.querySelectorAll('.plan-option').forEach(function(o) { o.classList.remove('selected'); });
        option.classList.add('selected');
        var radio = option.querySelector('input[type="radio"]');
        if (radio) radio.checked = true;
        selectedUrl = option.dataset.url;
        selectedPlan = radio ? radio.value : '';
      });
    });

    document.getElementById('checkoutBtn').addEventListener('click', function() {
      window.dataLayer = window.dataLayer || [];
      window.dataLayer.push({ event: 'begin_checkout', plan: selectedPlan });
      window.location.href = selectedUrl;
    });
  </script>
